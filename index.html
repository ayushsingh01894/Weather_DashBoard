<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<!-- Search -->
<div class="search-bar">
<input type="text" id="city" placeholder="Search city...">
<button onclick="getWeather()">Search</button>
<button onclick="getLocation()">📍</button>
<button onclick="toggleTheme()">🌙</button>
</div>

<!-- Main Weather Card -->
<div class="main-card">
<div class="left">
<h2 id="cityName">City</h2>
<h1 id="temp">--°C</h1>
<p id="desc">Weather</p>
</div>

<div class="right">
<img id="icon" src="">
</div>
</div>

<!-- Weather Details -->
<div class="details">
<div class="card">
<p>Humidity</p>
<h3 id="humidity">--</h3>
</div>

<div class="card">
<p>Wind</p>
<h3 id="wind">--</h3>
</div>

<div class="card">
<p>Pressure</p>
<h3 id="pressure">--</h3>
</div>

<div class="card">
<p>Feels Like</p>
<h3 id="feels">--</h3>
</div>
</div>

<div class="sun">
<div>
<p>Sunrise</p>
<h4 id="sunrise">--</h4>
</div>

<div>
<p>Sunset</p>
<h4 id="sunset">--</h4>
</div>
</div>

<div class="hourly" id="hourly"></div>

<button class="unit-toggle" onclick="toggleUnit()">°C / °F</button>
<!-- Forecast -->
<div class="forecast" id="forecast"></div>

<!-- Loader -->
<div class="loader" id="loader"></div>

<!-- Chart -->
<div class="chart-box">
  <canvas id="chart"></canvas>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
